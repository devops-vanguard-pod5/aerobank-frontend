name: Bank Frontend Pipeline

on:
  push:
    branches:
      - main

jobs:
  Continuous-Integration_build_and_push:
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: 763832339507.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: bank-frontend
      AWS_REGION: us-east-1
      IMAGE_TAG: ${{ github.run_number }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
        docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
  
    - name: Push Docker images to ECR
      run: |
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

    - name: Clean up Docker images locally
      if: always()
      run: |
        docker rmi ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} || true
        docker rmi ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest || true

  Continuous-Update_k8s_manifest:
    runs-on: ubuntu-latest
    needs: Continuous-Integration_build_and_push
    env:
      ECR_REGISTRY: 763832339507.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: bank-frontend
      IMAGE_TAG: ${{ github.run_number }}
    steps:
    - name: Checkout repository
      env:
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_PASSWORD: ${{ secrets.GIT_PASSWORD }}
      run: |
         git clone https://${GIT_USERNAME}:${GIT_PASSWORD}@github.com/devops-vanguard-pod5/aerobank-kubernetes-manifests.git
         
         cd aerobank-kubernetes-manifests
         git config --global user.email "${GIT_USERNAME}@users.noreply.github.com"
         git config --global user.name "${GIT_USERNAME}"

         # Bulletproof replace for the frontend manifest
         sed -i "s|image: .*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}|g" ./objects/Deployment/frontend.yaml

         git add ./objects/Deployment/frontend.yaml
         
         # The Safety Catch: Only commit and push IF there is a change detected
         git diff --staged --quiet || (git commit -m "Update frontend image to version ${{ env.IMAGE_TAG }}" && git push origin main)